## Prefix use Alt-q
unbind C-b
set -g prefix M-q
bind M-q send-prefix
set-option -sg escape-time 10
set-option -g focus-events on


# Reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.config/tmux/tmux.conf

## Split panes using | and -
bind - split-window -v -c "#{pane_current_path}"
bind _ split-window -v -l 40% -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
bind | split-window -h -l 40% -c "#{pane_current_path}"
unbind '"'
unbind %

# switch panes using Alt-hjkl without prefix
bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D

#
set-option -g status-interval 2

# switch windows with tab
bind Tab next-window

## Rename window via a centered popup (avoids the misaligned inline prompt)
bind , display-popup -w 50 -h 3 -T " rename window " -E "~/.config/tmux/scripts/rename-window.sh"

## When you press C-space q you can jump between numbered panes, make the numbers show for longer
set -g display-panes-time 5000

## Mouse support
set -g mouse on
set -g set-clipboard on

## Disable auto-rename so manual renames (prefix + ,) stick
set -g automatic-rename off

## Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

##########
# THEME
##########

# Fixes 24-bit color support
set -g default-terminal "tmux-256color"
# set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",xterm-256color:Tc"

# Tell tmux the outer terminal supports true color and synchronized output
# (DEC 2026). Without `sync`, tmux drops nvim's frame-batching and partial
# redraws leak through as flicker. Keyed per-TERM: the kitty and ghostty
# entries only apply under those terminals; the xterm-256color entry covers
# most others that report that TERM (a terminal lacking sync just ignores
# the escape).
set -ag terminal-features ",xterm-kitty:RGB:sync"
set -ag terminal-features ",xterm-ghostty:RGB:sync"
set -ag terminal-features ",xterm-256color:RGB:sync"

# don't do anything when a 'bell' rings
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# Configure the catppuccin plugin
set -g @catppuccin_flavor "frappe"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_flags "icon" # none, icon, or text
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_date_time_text "#(date '+ %a %b %d %-l:%M %p')"

# Load catppuccin
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# Make the status line pretty and add some modules
set -g status-right-length 140
set -g status-left-length 100
set -g status-left ""
set -g status-right ""
if-shell 'test -n "$SSH_CLIENT$SSH_TTY$SSH_CONNECTION"' { \
    set -agF status-right "#{E:@catppuccin_status_host}" \
}
if-shell '~/.config/tmux/scripts/has-battery.sh' { \
    set -agF status-right "#{E:@catppuccin_status_battery}" \
}
set -ag status-right "#{E:@catppuccin_status_date_time}"

run ~/.config/tmux/plugins/tmux-battery/battery.tmux
