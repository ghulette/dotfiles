# ─── kitty config ────────────────────────────────────────────────────────────
# Porting to a new machine:
#
#   1. Install kitty:
#        macOS:  brew install --cask kitty
#        Linux:  your distro package manager, or https://sw.kovidgoyal.net/kitty/binary/
#
#   2. Install the Nerd Font (required for battery/zoom glyphs below):
#        macOS:  brew install --cask font-jetbrains-mono-nerd-font
#        Linux:  download from https://www.nerdfonts.com/font-downloads
#                and drop into ~/.local/share/fonts, then `fc-cache -f`
#
#   3. Copy the whole ~/.config/kitty/ directory. Files expected:
#        - kitty.conf           (this file)
#        - current-theme.conf   (color theme)
#        - tab_bar.py           (custom tab bar: battery, clock, ZOOM indicator)
#
# Platform-specific notes:
#   - tab_bar.py uses `pmset` for battery, which is macOS-only. On Linux the
#     battery cell is skipped silently (no error).
#   - tab_bar.py uses `%-I` in strftime to strip the leading zero from the
#     hour; this works on macOS and glibc but not musl (Alpine). Change to
#     `%I` if needed.
#   - The font line below has a macOS-specific `postscript_name=...` suffix
#     that kitty adds when you use the font picker. On Linux, just:
#        font_family family='JetBrainsMono Nerd Font Mono'
# ─────────────────────────────────────────────────────────────────────────────

# ─── Keymap cheatsheet ───────────────────────────────────────────────────────
# ★ = custom binding in this file; everything else is a kitty built-in default.
#
# Tabs
#   ctrl+shift+t            new tab
#   ctrl+shift+q            close tab
#   ctrl+shift+right/left   next / previous tab
#   ctrl+shift+. / ,        move tab forward / backward
#   ctrl+shift+alt+t        set tab title
#   ctrl+shift+l         ★  fuzzy-search tabs by title
#   cmd+1 .. cmd+9       ★  jump to tab N
#
# OS windows
#   cmd+n (or ctrl+shift+n) new OS window
#   cmd+shift+n             new OS window with CWD of current tab
#
# Windows (splits inside a tab)
#   ctrl+shift+enter        new window (split) in current tab
#   ctrl+shift+w            close current window
#   ctrl+shift+]  / [       next / previous window
#   ctrl+shift+o         ★  cycle next window (alias for ])
#   ctrl+shift+-         ★  split below            (horizontal divider)
#   ctrl+shift+\         ★  split right            (vertical divider)
#   ctrl+shift+alt+-     ★  split below, 60/40
#   ctrl+shift+alt+\     ★  split right, 60/40
#   ctrl+shift+z         ★  zoom (toggle stack layout — see ZOOM indicator)
#   alt+shift+arrows     ★  focus neighbor in direction
#   ctrl+alt+shift+arrows ★ swap with neighbor in direction
#   ctrl+shift+f         ★  interactive swap-with-window picker
#   ctrl+shift+r            enter resize mode (arrows resize, esc to exit)
#   ctrl+shift+1 .. 0       focus window 1..10 within current tab
#
# Clipboard / hints
#   ctrl+shift+c / v        copy / paste
#   ctrl+shift+s            paste from selection
#   ctrl+shift+e            open URL under cursor via hints
#   ctrl+shift+p > f        hints for file paths
#   ctrl+shift+p > h        hints for hash strings
#
# Font size
#   ctrl+shift+= (cmd+=)    increase font size
#   cmd+-                   decrease font size (ctrl+shift+- is hijacked for split)
#   ctrl+shift+backspace    restore default font size
#
# Misc
#   ctrl+shift+f2           edit this config
#   ctrl+shift+cmd+,        reload config
#   ctrl+shift+/            show kitty documentation
#   ctrl+shift+f1           show kitten docs (hints, unicode_input, etc.)
#   ctrl+shift+u            unicode input
#   ctrl+shift+f5           reload with `hot reload` (no restart)
# ─────────────────────────────────────────────────────────────────────────────

# Font
font_size 14.0

# Theme
include current-theme.conf

# Tabs
tab_bar_style            custom
tab_powerline_style      round
tab_bar_edge             bottom
tab_title_template       "{index}: {title}"
tab_switch_strategy      previous

# Fuzzy-search tabs by title
map ctrl+shift+l select_tab

# Jump to tab N (macOS-style)
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9

# Windows (splits)
enabled_layouts splits:split_axis=horizontal,stack
map ctrl+shift+-      launch --location=hsplit --cwd=current
map ctrl+shift+\      launch --location=vsplit --cwd=current
# 60/40 variants (existing window keeps 60%, new gets 40%)
map ctrl+shift+alt+-  launch --location=hsplit --bias=40 --cwd=current
map ctrl+shift+alt+\  launch --location=vsplit --bias=40 --cwd=current
map ctrl+shift+z      toggle_layout stack
map ctrl+shift+o      next_window
# Direction-based window focus
map alt+shift+left    neighboring_window left
map alt+shift+right   neighboring_window right
map alt+shift+up      neighboring_window up
map alt+shift+down    neighboring_window down

# Direction-based window swap (same arrows + ctrl)
map ctrl+alt+shift+left    move_window left
map ctrl+alt+shift+right   move_window right
map ctrl+alt+shift+up      move_window up
map ctrl+alt+shift+down    move_window down

# Interactive swap picker
map ctrl+shift+f swap_with_window


# BEGIN_KITTY_FONTS
font_family      family='JetBrainsMono Nerd Font Mono' postscript_name=JetBrainsMonoNFM-Regular
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS